name: release

# Tag a version to build + publish Chronosphere for macOS, Linux and Windows.
#   git tag v0.1.0 && git push origin v0.1.0
# Modelled on the monolythium/desktop-wallet Tauri CI, adapted to electron-builder.
on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch: {}

permissions:
  contents: write # create the GitHub Release

jobs:
  # Create the draft release ONCE, serially, before the parallel build matrix.
  # GitHub allows multiple draft releases to share a tag, so if the three build
  # legs each ran electron-builder's "find-or-create draft by tag", a start-up race
  # could spawn duplicate drafts and split the artifacts across them. Pre-creating a
  # single draft here means every leg only ever *finds and uploads into* it.
  prepare:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # electron-builder keys the release off the PACKAGE version (it publishes into a
      # release tagged `v${package.json.version}`), while this workflow keys off the pushed
      # git tag. If they diverge, electron-builder would create a SECOND draft and split the
      # artifacts. Fail fast so the two identifiers can never disagree.
      - name: Assert tag matches package version
        run: |
          PKG=$(node -p "require('./apps/chronosphere/package.json').version")
          if [ "${{ github.ref_name }}" != "v$PKG" ]; then
            echo "::error::tag ${{ github.ref_name }} != v$PKG — bump apps/chronosphere/package.json to match the tag"
            exit 1
          fi

      - name: Ensure a single draft release for this tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          # Create the draft ONCE, serially, before the parallel build matrix (GitHub allows
          # multiple drafts per tag, so parallel find-or-create would spawn duplicates). It
          # stays a draft — invisible to electron-updater and the box mirror — until the seal
          # job publishes it once every artifact is uploaded.
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            # Re-run: only a still-DRAFT release is safe to reuse. Refuse to touch one that a
            # previous run already published — the operator should cut a new version instead
            # of mutating a live release in place (which would flash a broken feed to clients).
            if [ "$(gh release view "${{ github.ref_name }}" --json isDraft --jq .isDraft)" != "true" ]; then
              echo "::error::${{ github.ref_name }} is already published — bump the version and tag a new release."
              exit 1
            fi
            echo "Reusing existing draft ${{ github.ref_name }}."
          else
            gh release create "${{ github.ref_name }}" --draft \
              --title "${{ github.ref_name }}" \
              --notes "Automated Chronosphere release ${{ github.ref_name }}."
          fi

  build:
    needs: [prepare]
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest,   platform: mac }
          - { os: ubuntu-latest,  platform: linux }
          - { os: windows-latest, platform: win }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install (monorepo)
        run: npm ci

      - name: Build Chronosphere (main + preload + renderer)
        run: npm run build --workspace apps/chronosphere

      # Notarization uses an App Store Connect API key (.p8). electron-builder
      # reads it from APPLE_API_KEY (a path), so materialize it on the runner.
      - name: Write App Store Connect API key (macOS)
        if: matrix.platform == 'mac'
        run: |
          echo "${{ secrets.APPSTORE_CONNECT_KEY_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/asc-key.p8"
          echo "APPLE_API_KEY=$RUNNER_TEMP/asc-key.p8" >> "$GITHUB_ENV"

      - name: Package, sign, notarize + publish
        working-directory: apps/chronosphere
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # ── Windows · Azure Trusted Signing (integrated; keeps updater hashes correct) ──
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}

          # ── macOS · Developer ID signing (CSC_LINK accepts the base64 .p12 directly) ──
          CSC_LINK: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

          # ── macOS · notarization (APPLE_API_KEY path is exported in the step above) ──
          APPLE_API_KEY_ID: ${{ secrets.APPSTORE_CONNECT_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        # No --mac/--win/--linux flag: electron-builder targets the host OS, so
        # each matrix job builds its own platform and publishes into one release.
        run: npx --no-install electron-builder --publish always

  # Seal + publish the release. The build legs publish their signed artifacts to a
  # DRAFT GitHub release (build.publish.releaseType=draft), so it stays invisible to
  # electron-updater AND the box mirror while assets upload — no client can hit a
  # half-built release (the mid-build "latest-mac.yml 404" race). This job runs ONLY
  # after all three legs succeed: it uploads manifest.json (the authoritative "release
  # is complete" signal the-real-antares.com waits for) and then flips the draft to
  # published in one atomic step. A failed build leaves the draft unpublished, so a
  # partial release never reaches users. Needs only the ephemeral GITHUB_TOKEN; never
  # touches the box.
  seal:
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Seal manifest, then publish the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          node apps/chronosphere/scripts/gen-release-manifest.mjs "${{ github.ref_name }}" > manifest.json
          cat manifest.json
          gh release upload "${{ github.ref_name }}" manifest.json --clobber
          # Every artifact + the sealed manifest are now uploaded to the draft release.
          # Flip it to published — the atomic "go live" that makes it visible to
          # electron-updater and the box mirror at the same instant, with all files present.
          gh release edit "${{ github.ref_name }}" --draft=false
